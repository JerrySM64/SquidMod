name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-libadwaita
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-rust

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-ci-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-ci-

      - name: Build
        run: cargo build

  build-linux-glibc:
    name: Build Linux (glibc)
    runs-on: ubuntu-latest
    container: debian:13

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential ca-certificates curl file git pkg-config \
            libssl-dev libgtk-4-dev libadwaita-1-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-glibc-ci-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-glibc-ci-

      - name: Build
        run: cargo build

  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install gtk4 libadwaita pkg-config dylibbundler

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-ci-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-ci-

      - name: Build
        run: make macos-debug
