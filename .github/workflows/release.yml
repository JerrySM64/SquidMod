name: Release

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-libadwaita
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-rust
            mingw-w64-x86_64-nsis
            mingw-w64-x86_64-upx
            mingw-w64-x86_64-7zip

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-release-

      - name: Build
        run: cargo build --release

      - name: Compress binary
        run: upx --best --lzma target/release/SquidMod.exe

      - name: Create portable ZIP
        run: |
          export VERSION=${{ github.ref_name }}
          ./build.sh
          ZIP_NAME=$(cat zip_name.txt)
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Build NSIS installer
        run: |
          cp assets/icon.ico pkg/icon.ico 2>/dev/null || true
          makensis //DVERSION=${{ github.ref_name }} //DOUTFILE=SquidMod-${{ github.ref_name }}-x64.exe SquidModInstaller.nsi

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: ${{ env.ZIP_NAME }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: SquidMod-${{ github.ref_name }}-x64.exe

  build-linux-glibc:
    name: Build Linux AppImage (glibc)
    runs-on: ubuntu-latest
    container: debian:13

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential ca-certificates curl file git pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libglib2.0-dev \
            libssl-dev \
            libfuse2 \
            upx-ucl \
            squashfs-tools

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-glibc-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-glibc-release-

      - name: Build
        run: cargo build --release

      - name: Compress binary
        run: upx --best --lzma target/release/SquidMod

      - name: Build AppImage
        run: |
          APPDIR=AppDir
          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/share/applications" \
            "$APPDIR/usr/share/icons/hicolor/256x256/apps"

          cp target/release/SquidMod "$APPDIR/usr/bin/squidmod"
          chmod +x "$APPDIR/usr/bin/squidmod"

          printf '[Desktop Entry]\nType=Application\nName=SquidMod\nExec=squidmod\nIcon=squidmod\nCategories=Utility;\nTerminal=false\n' > "$APPDIR/usr/share/applications/SquidMod.desktop"
          cp "$APPDIR/usr/share/applications/SquidMod.desktop" "$APPDIR/SquidMod.desktop"

          printf '#!/bin/sh\nexec "$(dirname "$0")/usr/bin/squidmod" "$@"\n' > "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"

          cp assets/hicolor/256x256/apps/dev.jerrysm64.squidmod.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/squidmod.png"
          cp "$APPDIR/usr/share/icons/hicolor/256x256/apps/squidmod.png" "$APPDIR/squidmod.png"
          ln -s squidmod.png "$APPDIR/.DirIcon"

          curl -L -o appimagetool.AppImage https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage
          ./appimagetool.AppImage --appimage-extract
          ARCH=x86_64 ./squashfs-root/AppRun "$APPDIR" SquidMod-${{ github.ref_name }}-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: SquidMod-${{ github.ref_name }}-x86_64.AppImage

  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install gtk4 libadwaita pkg-config dylibbundler

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-release-

      - name: Build macOS release
        run: make macos-release

      - name: Zip app bundle
        run: |
          cd build/release
          zip -r ../../SquidMod-${{ github.ref_name }}-macOS.zip SquidMod.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: SquidMod-${{ github.ref_name }}-macOS.zip

  release:
    name: Publish GitHub Release
    needs: [build-windows, build-linux-glibc, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows portable
        uses: actions/download-artifact@v4
        with:
          name: windows-portable

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer

      - name: Download Linux glibc AppImage
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage

      - name: Download macOS app
        uses: actions/download-artifact@v4
        with:
          name: macos-app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            SquidMod-*.zip
            SquidMod-*.exe
            SquidMod-*.AppImage
